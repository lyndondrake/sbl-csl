metadata:
  description: CSL citation test cases from biblatex-sbl-examples
  bibliography: ../sbl-examples.yaml
  source_files:
    tex: /usr/local/texlive/2025/texmf-dist/doc/latex/biblatex-sbl/biblatex-sbl-examples.tex
    pdf: /usr/local/texlive/2025/texmf-dist/doc/latex/biblatex-sbl/biblatex-sbl-examples.pdf
tests:
- id: 6.2.1-a-book-by-a-single-author
  description: A Book by a Single Author
  sblhs_section: 6.2.1
  entry_id: talbert:1992
  expectations:
    sbl-fullnote:
      first_note:
        locator: '127'
        expected: 'Charles H. Talbert, *Reading John: A Literary and Theological Commentary on the Fourth Gospel and the Johannine
          Epistles* (New York: Crossroad, 1992), 127.'
      subsequent_note:
        locator: '22'
        expected: Talbert, *Reading John*, 22.
      bibliography:
        expected: 'Talbert, Charles H. *Reading John: A Literary and Theological Commentary on the Fourth Gospel and the Johannine
          Epistles*. Crossroad, 1992.'
  notes: Standard book citation; no special handling required.
- id: 6.2.2-a-book-by-two-or-three-authors
  description: A Book by Two or Three Authors
  sblhs_section: 6.2.2
  entry_id: robinson+koester:1971
  expectations:
    sbl-fullnote:
      first_note:
        locator: '237'
        expected: 'James M. Robinson and Helmut Koester, *Trajectories through Early Christianity* (Philadelphia: Fortress,
          1971), 237.'
      subsequent_note:
        locator: '23'
        expected: Robinson and Koester, *Trajectories*, 23.
      bibliography:
        expected: 'Robinson, James M., and Helmut Koester. *Trajectories through Early Christianity*. Fortress,
          1971.'
- id: 6.2.3-a-book-by-more-than-three
  description: A Book by More than Three Authors
  sblhs_section: 6.2.3
  entry_id: scott+etal:1993
  expectations:
    sbl-fullnote:
      first_note:
        locator: '53'
        expected: 'Bernard Brandon Scott et al., *Reading New Testament Greek* (Peabody, MA: Hendrickson, 1993), 53.'
      subsequent_note:
        locator: '42'
        expected: Scott et al., *Reading New Testament Greek*, 42.
      bibliography:
        expected: 'Scott, Bernard Brandon, Margaret Dean, Kristen Sparks, and Frances LaZar. *Reading New Testament Greek*.
          Hendrickson, 1993.'
  notes: CSL handles et al. automatically based on style settings.
- id: 6.2.4-a-translated-volume
  description: A Translated Volume
  sblhs_section: 6.2.4
  entry_id: egger:1996
  expectations:
    sbl-fullnote:
      first_note:
        locator: '28'
        expected: 'Wilhelm Egger, *How to Read the New Testament: An Introduction to Linguistic and Historical-Critical Methodology*,
          trans. Peter Heinegg (Peabody, MA: Hendrickson, 1996), 28.'
      subsequent_note:
        locator: '291'
        expected: Egger, *How to Read*, 291.
      bibliography:
        expected: 'Egger, Wilhelm. *How to Read the New Testament: An Introduction to Linguistic and Historical-Critical Methodology*.
          Translated by Peter Heinegg. Hendrickson, 1996.'
- id: 6.2.5-the-full-history-of-a
  description: The Full History of a Translated Volume
  sblhs_section: 6.2.5
  entry_id: wellhausen:1957
  expectations:
    sbl-fullnote:
      first_note:
        locator: '296'
        expected: 'Julius Wellhausen, <em>Prolegomena to the History of

          Ancient Israel</em> (New York: Meridian Books, 1957), 296.'
      bibliography:
        expected: 'Wellhausen, Julius. <em>Prolegomena to the History of Ancient

          Israel</em>. Meridian Books, 1957.'
  notes: CSL cannot automatically chain related entries (translationof, reprintof). The `note` field contains the full 
    history manually. A Lua filter could potentially automate this.
- id: 6.2.6-a-book-with-one-editor
  description: A Book with One Editor
  sblhs_section: 6.2.6
  entry_id: tigay:1985
  expectations:
    sbl-fullnote:
      first_note:
        locator: '35'
        expected: 'Jeffrey H. Tigay, ed., *Empirical Models for Biblical Criticism* (Philadelphia: University of Pennsylvania
          Press, 1985), 35.'
      subsequent_note:
        locator: '38'
        expected: Tigay, *Empirical Models*, 38.
      bibliography:
        expected: 'Tigay, Jeffrey H., ed. *Empirical Models for Biblical Criticism*. University of Pennsylvania
          Press, 1985.'
- id: 6.2.7-a-book-with-two-or-three
  description: A Book with Two or Three Editors
  sblhs_section: 6.2.7
  entry_id: kaltner+mckenzie:2002
  expectations:
    sbl-fullnote:
      first_note:
        locator: xii
        expected: 'John Kaltner and Steven L. McKenzie, eds., *Beyond Babel: A Handbook for Biblical Hebrew and Related Languages*,
          RBS 42 (Atlanta: Society of Biblical Literature, 2002), xii.'
      subsequent_note:
        locator: viii
        expected: Kaltner and McKenzie, *Beyond Babel*, viii.
      bibliography:
        expected: 'Kaltner, John, and Steven L. McKenzie, eds. *Beyond Babel: A Handbook for Biblical Hebrew and Related Languages*.
          RBS 42. Society of Biblical Literature, 2002.'
  notes: Series abbreviation (RBS) in the note field. CSL styles vary in how they handle series.
- id: 6.2.8-a-book-with-four-or-more
  description: A Book with Four or More Editors
  sblhs_section: 6.2.8
  entry_id: oates+etal:2001
  expectations:
