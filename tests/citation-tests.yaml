          ed., BASPSup 9 (Oakville, CT: American Society of Papyrologists, 2001), 10.'
      bibliography:
        expected: 'Oates, John F., William H. Willis, Roger S. Bagnall, and Klass A. Worp, eds. *Checklist of Editions of
          Greek and Latin Papyri, Ostraca, and Tablets*. 5th ed. BASPSup 9. American Society of Papyrologists,
          2001.'
- id: 6.2.9-a-book-with-both-author-and
  description: A Book with Both Author and Editor
  sblhs_section: 6.2.9
  entry_id: schillebeeckx:1986
  expectations:
    sbl-fullnote:
      first_note:
        locator: '20'
        expected: 'Edward Schillebeeckx, *The Schillebeeckx Reader*, ed. Robert J. Schreiter (Edinburgh: T&T Clark, 1986),
          20.'
      bibliography:
        expected: 'Schillebeeckx, Edward. *The Schillebeeckx Reader*. Edited by Robert J. Schreiter. T&T Clark,
          1986.'
- id: 6.2.10-a-book-with-author-editor-and
  description: A Book with Author, Editor, and Translator
  sblhs_section: 6.2.10
  entry_id: blass+debrunner:1982
  expectations:
    sbl-fullnote:
      first_note:
        locator: '40'
