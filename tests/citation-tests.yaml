          trans. Giordana Pisi (Brescia: Paideia, 1982), 40.'
      bibliography:
        expected: 'Blass, Friedrich, and Albert Debrunner. *Grammatica del greco del Nuovo Testamento*. Edited by Friedrich
          Rehkopf. Translated by Giordana Pisi. Paideia, 1982.'
- id: 6.2.11-a-title-in-a-modern-work
  description: A Title in a Modern Work Citing a Nonroman Alphabet
  sblhs_section: 6.2.11
  entry_id: irvine:2014
  expectations:
    sbl-fullnote:
      first_note:
        expected: 'Stuart A. Irvine, "Idols [*ktbwnm*]: A Note on Hosea 13:2a," *JBL* 133 (2014): 509–17.'
  notes: Nonroman text in brackets within the title. Use italics or Unicode directly.
- id: 6.2.12-an-article-in-and-edited
  description: An Article in and Edited Volume
  sblhs_section: 6.2.12
  entry_id: attridge:1986
  expectations:
    sbl-fullnote:
      first_note:
        expected: 'Harold W. Attridge, "Jewish Historiography," in *Early Judaism and Its Modern Interpreters*, ed. Robert
          A. Kraft and George W. E. Nickelsburg (Philadelphia and Atlanta: Fortress and Scholars Press, 1986), 311–43.'
      subsequent_note:
        locator: 311-343
        expected: Attridge, "Jewish Historiography," 311–43.
      bibliography:
        expected: 'Attridge, Harold W. “Jewish Historiography.” Pages 311–43 in*Early Judaism and Its Modern Interpreters*.
          Edited by Robert A. Kraft and George W. E. Nickelsburg. Fortress and Scholars Press, 1986.'
- id: 6.2.13-an-article-in-a-festschrift
  description: An Article in a Festschrift
  sblhs_section: 6.2.13
  entry_id: vanseters:1995
  expectations:
    sbl-fullnote:
      first_note:
        expected: 'John Van Seters, "The Theology of the Yahwist: A Preliminary Sketch," in *"Wer ist wie du, Herr, unter
          den Göttern?": Studien zur Theologie und Religionsgeschichte Israels für Otto Kaiser zum 70. Geburtstag*, ed. Ingo
          Kottsieper et al. (Göttingen: Vandenhoeck & Ruprecht, 1995), 219–28.'
      subsequent_note:
        locator: '222'
        expected: ''
      bibliography:
        expected: ''
- id: 6.2.14-an-introduction-preface-or
  description: An Introduction, Preface, or Foreword Written by Someone Other Than the Author
  sblhs_section: 6.2.14
  entry_id: boers:1996
  expectations:
    sbl-fullnote:
      first_note:
        locator: xi-xxi
        expected: 'Hendrikus Boers, introduction to *How to Read the New Testament: An Introduction to Linguistic and Historical-Critical
          Methodology*, by Wilhelm Egger, trans. Peter Heinegg (Peabody, MA: Hendrickson, 1996), xi–xxi.'
      subsequent_note:
        locator: xi-xx
        expected: Boers, introduction, xi–xx.
      bibliography:
        expected: 'Boers, Hendrikus. Introduction to*How to Read the New Testament: An Introduction to Linguistic and Historical-Critical
          Methodology*, by Wilhelm Egger. Translated by Peter Heinegg. Hendrickson, 1996.'
  notes: The `bookauthor` field distinguishes the introduction author from the book author.
